Include.pcm_split.File "/USB-Audio/RODE/RODECaster-Pro-II-USB1-Multitrack-Capture-Channels.conf"
Include.pcm_split.File "/USB-Audio/RODE/RODECaster-Pro-II-USB1-Multitrack-Playback-Channels.conf"

SectionDevice."Speaker" {
	Comment "System"

	Value {
		PlaybackPriority 100
	}
	Macro.pcm_split.SplitPCMDevice {
		Name "rodecaster_pro_ii_stereo_out"
		Direction Playback
		Device 1
		HWChannels 10
		Channels 2
		Channel0 0
		Channel1 1
		ChannelPos0 FL
		ChannelPos1 FR
	}
}

