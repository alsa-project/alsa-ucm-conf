Include.pcm_split.File "/common/pcm/split.conf"

# This profile exposes the most common channel configurations:
#
# - Analog line outputs in stereo, 4.0, 5.1, and 7.1 surround
# - Headphone outputs as two independent stereo pairs
# - Analog inputs: mic/instrument inputs mono, line inputs stereo
# - AES/EBU output and input as stereo
# - ADAT outputs and inputs as two independent 8-channel direct blocks
# - MADI outputs and inputs as two independent 32-channel direct blocks

# Helper macro to fill HWChannelPos entries for a 94-channel PCM.
# All positions are set to the given value; individual devices override
# only the channels they actually use via SplitPCMDevice.

