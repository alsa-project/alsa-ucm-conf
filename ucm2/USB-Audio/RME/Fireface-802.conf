Comment "Fireface 802"

# The Fireface 802 (non-FS variant) in Class Compliant (CC) mode provides 22 playback and
# capture channels each (ADAT port 2 / channels 22-29 are unavailable by ALSA in CC mode).
#
# Output channel layout:
# - channels  0 to  7: analog line outputs 1-8 (TRS balanced)
# - channels  8 to 11: headphone outputs 9-12 (two stereo pairs, front panel)
# - channels 12 to 13: AES/EBU output (XLR)
# - channels 14 to 21: ADAT optical output 1 (TOSLINK, 8 channels)
#
# Input channel layout:
# - channels  0 to  7: analog line inputs 1-8 (TRS balanced, rear)
# - channels  8 to 11: mic/instrument inputs 9-12 (XLR/TRS combo, front panel)
# - channels 12 to 13: AES/EBU input (XLR)
# - channels 14 to 21: ADAT optical input 1 (TOSLINK, 8 channels)
#
# Note: For 30-channel USB mode (driver mode), Fireface-802-USB.conf is used.

SectionUseCase."HiFi" {
	Comment "Default"
	File "/USB-Audio/RME/Fireface-802-HiFi.conf"
}

Include.dhw.File "/common/directm.conf"

Macro.0.DirectUseCase { Id="Direct" PlaybackChannels=22 CaptureChannels=22 }
