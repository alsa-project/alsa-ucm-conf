Comment "Fireface 802 (USB-Mode)"

# The Fireface 802 provides 30 playback and capture channels each in driver based (USB) mode.
#
# Output channel layout:
# - channels  0 to  7: analog line outputs 1-8 (TRS balanced)
# - channels  8 to 11: headphone outputs 9-12 (two stereo pairs, front panel)
# - channels 12 to 13: AES/EBU output (XLR)
# - channels 14 to 29: ADAT optical outputs (2x TOSLINK, 8 channels each)
#
# Input channel layout:
# - channels  0 to  7: analog line inputs 1-8 (TRS balanced, rear)
# - channels  8 to 11: mic/instrument inputs 9-12 (XLR/TRS combo, front panel)
# - channels 12 to 13: AES/EBU input (XLR)
# - channels 14 to 29: ADAT optical inputs (2x TOSLINK, 8 channels each)
#
# Physical connector layout (viewed from rear):
# - LINE IN  1-8: TRS 1/4", balanced, rear panel
# - LINE OUT 1-8: TRS 1/4", balanced, rear panel
# - MIC/INST 9-12: XLR/TRS combo, front panel, 48V phantom power on 9-10
# - PHONES 9-10: TRS 1/4", front panel
# - PHONES 11-12: TRS 1/4", front panel
# - AES/EBU: XLR in/out pair, rear panel
# - ADAT 1: TOSLINK in/out (channels 1-8)
# - ADAT 2: TOSLINK in/out (channels 9-16)
#
# Note: For 22-channel mode (CC mode), Fireface-802.conf is used.

SectionUseCase."HiFi" {
	Comment "Default"
	File "/USB-Audio/RME/Fireface-802-USB-HiFi.conf"
}

Include.dhw.File "/common/directm.conf"

Macro.0.DirectUseCase { Id="Direct" PlaybackChannels=30 CaptureChannels=30 }
