Comment "Fireface UFX III"

# The Fireface UFX III (CC-Mode), connected via USB3 (super speed),
# provides 94 playback and capture channels each.
#
# Output channel layout:
# - channels  0 to  7: analog line outputs 1-8 (XLR balanced, rear)
# - channels  8 to 11: headphone outputs 9-12 (two stereo pairs, front panel)
# - channels 12 to 13: AES/EBU output (XLR)
# - channels 14 to 29: ADAT optical outputs (2x TOSLINK, 8 channels each)
# - channels 30 to 93: MADI outputs (64 channels)
#
# Input channel layout:
# - channels  0 to  7: analog line inputs 1-8 (XLR balanced, rear)
# - channels  8 to 11: mic/instrument inputs 9-12 (XLR/TRS combo, front panel)
# - channels 12 to 13: AES/EBU input (XLR)
# - channels 14 to 29: ADAT optical inputs (2x TOSLINK, 8 channels each)
# - channels 30 to 93: MADI inputs (64 channels)
#
# Physical connector layout (viewed from rear):
# - LINE IN  1-8: XLR balanced, rear panel
# - LINE OUT 1-8: XLR balanced (1-2), TRS 1/4" (3-8), rear panel
# - MIC/INST 9-12: XLR/TRS combo, front panel, 48V phantom power
# - PHONES 9-10: TRS 1/4", front panel
# - PHONES 11-12: TRS 1/4", front panel
# - AES/EBU: XLR in/out pair, rear panel
# - ADAT 1: TOSLINK in/out (channels 1-8)
# - ADAT 2: TOSLINK in/out (channels 9-16)
# - MADI: BNC coax + SFP optical (64 channels)

SectionUseCase."HiFi" {
	Comment "Default"
	File "/USB-Audio/RME/Fireface-UFX-III-HiFi.conf"
}

Include.dhw.File "/common/directm.conf"

Macro.0.DirectUseCase { Id="Direct" PlaybackChannels=94 CaptureChannels=94 }
