Include.pcm_split.File "/common/pcm/split.conf"

# Class Compliant (CC) mode: 22 channels (ADAT port 2 unavailable).
#
# This profile exposes the most common channel configurations:
#
# - Analog line outputs in stereo, 4.0, 5.1, and 7.1 surround
# - Headphone outputs as two independent stereo pairs
# - Analog inputs: mic/instrument inputs mono, line inputs stereo
# - ADAT output and input as a single 8-channel direct block (port 1 only)
# - AES/EBU output and input as stereo

Macro [
	{
		SplitPCM {
			Name "ff802_stereo_out"
			Direction Playback
			Format S24_3LE
			Channels 2
			HWChannels 22
			HWChannelPos0 FL
