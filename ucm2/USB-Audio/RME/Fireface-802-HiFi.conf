	Value {
		PlaybackPriority 192
	}

	Macro.pcm_split.SplitPCMDevice {
		Name "ff802_stereo_out"
		Direction Playback
		HWChannels 22
		Channels 2
		Channel0 0
		Channel1 1
		ChannelPos0 FL
		ChannelPos1 FR
