Include.pcm_split.File "/common/pcm/split.conf"

Macro [
	{
		SplitPCM {
			Name "ulm200d_mono_in"
			Direction Capture
			Format S32_LE
			Channels 1
			HWChannels 2
			HWChannelPos0 MONO
			HWChannelPos1 MONO
		}
	}
]

Define.PCMCTLName "PCM Playback"

SectionDevice."Mic1" {
	Comment "Mic 1"

	Value {
		CapturePriority 400
		CaptureMixer "default:${CardId}"
		CaptureMixerElem "Mic 1"
	}
	Macro.pcm_split.SplitPCMDevice {
		Name "ulm200d_mono_in"
		Direction Capture
		HWChannels 2
		Channels 1
		Channel0 0
		ChannelPos0 MONO
	}
}

SectionDevice."Mic2" {
	Comment "Mic 2"

	Value {
		CapturePriority 300
		CaptureMixer "default:${CardId}"
		CaptureMixerElem "Mic 2"
	}
	Macro.pcm_split.SplitPCMDevice {
		Name "ulm200d_mono_in"
		Direction Capture
		HWChannels 2
		Channels 1
		Channel0 1
		ChannelPos0 MONO
	}
}
