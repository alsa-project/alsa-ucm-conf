SectionDevice."Speaker" {
	Comment "Lineout speaker"

	ConflictingDevice [
		"Headphones"
	]

	EnableSequence [
		cset "name='LOL Mux' Playback"
	]

	DisableSequence [
		cset "name='LOL Mux' Open"
	]

	Value {
		PlaybackPriority 300
		PlaybackChannels 1
		PlaybackPCM "hw:${CardId},${var:PlayDevN}"
	}
}

SectionDevice."Headphones" {
	Comment "Earphone speaker"

	ConflictingDevice [
		"Speaker"
	]

	EnableSequence [
		cset "name='HPL Mux' Audio Playback"
	]

	DisableSequence [
		cset "name='HPL Mux' Open"
	]

	Value {
		PlaybackPriority 400
		PlaybackChannels 2
		PlaybackPCM "hw:${CardId},${var:PlayDevN}"
		JackControl "Headphone Jack"
	}
}

SectionDevice."Headset" {
	Comment "Earphone microphone"

	ConflictingDevice [
		"Mic1"
	]

	EnableSequence [
		cset "name='ADC L Mux' Left Preamplifier"
		cset "name='PGA L Mux' AIN1"
	]

	DisableSequence [
		cset "name='ADC L Mux' Idle"
		cset "name='PGA L Mux' None"
	]

	Value {
		CapturePriority 500
		CaptureChannels "${var:CapChanN}"
		CapturePCM "hw:${CardId},${var:CapDevN}"
		JackControl "Headset Mic Jack"
	}
}

SectionDevice."Mic1" {
	Comment "Analog microphone"

	ConflictingDevice [
		"Headset"
	]

	EnableSequence [
		cset "name='ADC L Mux' Left Preamplifier"
		cset "name='ADC R Mux' Right Preamplifier"
		cset "name='PGA L Mux' AIN0"
		cset "name='PGA R Mux' AIN2"
	]

	DisableSequence [
		cset "name='ADC L Mux' Idle"
		cset "name='ADC R Mux' Idle"
		cset "name='PGA L Mux' None"
		cset "name='PGA R Mux' None"
	]

	Value {
		CapturePriority 400
		CaptureChannels 2
		CapturePCM "hw:${CardId},${var:CapDevN}"
	}
}

SectionDevice."Mic2" {
	Comment "Digital microphone"

	Value {
		CapturePriority 300
		CaptureChannels 2
		CapturePCM "hw:${CardId},11"
	}
}

SectionDevice."Line1" {
	Comment "PCM input"

	ConflictingDevice [
		"Line3"
	]

	EnableSequence [
		cset "name='UL1_CH1 I2SIN5_CH1' off"
		cset "name='UL1_CH2 I2SIN5_CH2' off"
		cset "name='UL1_CH1 PCM_0_CAP_CH1' on"
		cset "name='UL1_CH2 PCM_0_CAP_CH2' on"
	]

	DisableSequence [
		cset "name='UL1_CH1 PCM_0_CAP_CH1' off"
		cset "name='UL1_CH2 PCM_0_CAP_CH2' off"
	]

	Value {
		CapturePriority 200
		CaptureChannels 2
		CapturePCM "hw:${CardId},12"
	}
}

SectionDevice."Line2" {
	Comment "PCM output"

	Value {
		PlaybackPriority 200
		PlaybackChannels 2
		PlaybackPCM "hw:${CardId},2"
	}
}

SectionDevice."Line3" {
	Comment "I2S5 input"

	ConflictingDevice [
		"Line1"
	]

	EnableSequence [
		cset "name='UL1_CH1 PCM_0_CAP_CH1' off"
		cset "name='UL1_CH2 PCM_0_CAP_CH2' off"
		cset "name='UL1_CH1 I2SIN5_CH1' on"
		cset "name='UL1_CH2 I2SIN5_CH2' on"
	]

	DisableSequence [
		cset "name='UL1_CH1 I2SIN5_CH1' off"
		cset "name='UL1_CH2 I2SIN5_CH2' off"
	]

	Value {
		CapturePriority 100
		CaptureChannels 2
		CapturePCM "hw:${CardId},12"
	}
}

SectionDevice."Line4" {
	Comment "I2S5 output"

	Value {
		PlaybackPriority 100
		PlaybackChannels 8
		PlaybackPCM "hw:${CardId},8"
	}
}

SectionDevice."Line5" {
	Comment "I2S6 input"

	Value {
		CapturePriority 100
		CaptureChannels 2
		CapturePCM "hw:${CardId},13"
	}
}

SectionDevice."Line6" {
	Comment "I2S6 output"

	Value {
		PlaybackPriority 100
		PlaybackChannels 2
		PlaybackPCM "hw:${CardId},3"
	}
}
