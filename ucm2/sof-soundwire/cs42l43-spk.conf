# Use case Configuration for sof-soundwire card

SectionDevice."Speaker" {
	Comment "Speaker"

	If.hs_present {
		Condition {
			Type String
			Haystack "${var:HeadsetCodec1}"
			Needle "cs42l43"
		}
		True.ConflictingDevice [
			"Headphones"
		]
	}

	EnableSequence [
		cset "name='Speaker Switch' on"
		cset "name='cs42l43 Speaker L Input 1' 'DP6RX1'"
		cset "name='cs42l43 Speaker R Input 1' 'DP6RX2'"
	]

	DisableSequence [
		cset "name='cs42l43 Speaker L Input 1' 'None'"
		cset "name='cs42l43 Speaker R Input 1' 'None'"
		cset "name='Speaker Switch' off"
	]


	If.0 {
		Condition {
			Type String
			Empty "${var:-@OutMix>0dB}"
		}
		True.Value {
			PlaybackMixer "default:${CardId}"
			PlaybackMixerElem "cs42l43 Speaker"
		}
		False.Value {
			PlaybackMixerElem "cs42l43 Speaker Digital"
		}
	}

	If.cs35l56_mute {
		Condition {
			Type RegexMatch
			Regex "spk:cs35l56( |$)"
			String "${CardComponents}"
		}
		True.Value {
			PlaybackMixer "default:${CardId}"
			PlaybackMixerElem "cs35l56 Speaker"
		}
	}

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId},2"
	}
}
